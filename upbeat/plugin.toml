id = "neuro/upbeat"
name = "Upbeat"
version = "1.0.0"
min_noctalia = "5.0.0"
author = "neuro"
license = "MIT"
icon = "at"
deprecated = false
description = "A bar widget that displays Swatch Internet (.beat) Time"
tags = ["fun", "clock", "utility", "time"]

[[widget]]
id = "upbeat"
entry = "upbeat.luau"

[[widget.setting]]
key = "show_centibeats"
type = "bool"
label = "Display subbeats"
default = true
description = "Toggle subbeat display (.xx)"